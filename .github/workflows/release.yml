name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

  build:
    name: Build (${{ matrix.target }})
    needs: test
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf mac-cleanup-${{ matrix.target }}.tar.gz mac-cleanup
          shasum -a 256 mac-cleanup-${{ matrix.target }}.tar.gz > mac-cleanup-${{ matrix.target }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-cleanup-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/mac-cleanup-${{ matrix.target }}.tar.gz
            target/${{ matrix.target }}/release/mac-cleanup-${{ matrix.target }}.tar.gz.sha256

  universal:
    name: Universal binary
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download aarch64 artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-cleanup-aarch64-apple-darwin
          path: aarch64

      - name: Download x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-cleanup-x86_64-apple-darwin
          path: x86_64

      - name: Extract binaries
        run: |
          tar xzf aarch64/mac-cleanup-aarch64-apple-darwin.tar.gz -C aarch64
          tar xzf x86_64/mac-cleanup-x86_64-apple-darwin.tar.gz -C x86_64

      - name: Create universal binary
        run: |
          lipo -create aarch64/mac-cleanup x86_64/mac-cleanup -output mac-cleanup
          tar czf mac-cleanup-universal-apple-darwin.tar.gz mac-cleanup
          shasum -a 256 mac-cleanup-universal-apple-darwin.tar.gz > mac-cleanup-universal-apple-darwin.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-cleanup-universal-apple-darwin
          path: |
            mac-cleanup-universal-apple-darwin.tar.gz
            mac-cleanup-universal-apple-darwin.tar.gz.sha256

  release:
    name: Create Release
    needs: [build, universal]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/mac-cleanup-aarch64-apple-darwin/*
            artifacts/mac-cleanup-x86_64-apple-darwin/*
            artifacts/mac-cleanup-universal-apple-darwin/*

  publish-crate:
    name: Publish to crates.io
    needs: test
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
