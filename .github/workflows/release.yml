name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Run tests
        run: cargo test

  build:
    name: Build (${{ matrix.target }})
    needs: test
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf mac-cleanup-${{ matrix.target }}.tar.gz mac-cleanup
          shasum -a 256 mac-cleanup-${{ matrix.target }}.tar.gz > mac-cleanup-${{ matrix.target }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-cleanup-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/mac-cleanup-${{ matrix.target }}.tar.gz
            target/${{ matrix.target }}/release/mac-cleanup-${{ matrix.target }}.tar.gz.sha256

  universal:
    name: Universal binary
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download aarch64 artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-cleanup-aarch64-apple-darwin
          path: aarch64

      - name: Download x86_64 artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-cleanup-x86_64-apple-darwin
          path: x86_64

      - name: Extract binaries
        run: |
          tar xzf aarch64/mac-cleanup-aarch64-apple-darwin.tar.gz -C aarch64
          tar xzf x86_64/mac-cleanup-x86_64-apple-darwin.tar.gz -C x86_64

      - name: Create universal binary
        run: |
          lipo -create aarch64/mac-cleanup x86_64/mac-cleanup -output mac-cleanup
          tar czf mac-cleanup-universal-apple-darwin.tar.gz mac-cleanup
          shasum -a 256 mac-cleanup-universal-apple-darwin.tar.gz > mac-cleanup-universal-apple-darwin.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-cleanup-universal-apple-darwin
          path: |
            mac-cleanup-universal-apple-darwin.tar.gz
            mac-cleanup-universal-apple-darwin.tar.gz.sha256

  release:
    name: Create Release
    needs: [build, universal]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/mac-cleanup-aarch64-apple-darwin/*
            artifacts/mac-cleanup-x86_64-apple-darwin/*
            artifacts/mac-cleanup-universal-apple-darwin/*

  publish-crate:
    name: Publish to crates.io
    needs: test
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish
        run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  update-tap:
    name: Bump Homebrew tap formula
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    env:
      # Owner of the tap repo. Change if your tap lives elsewhere.
      TAP_OWNER: Yurzs
      TAP_REPO: homebrew-tap
      FORMULA_PATH: Formula/mac-cleanup.rb
    steps:
      - name: Download universal artifact
        uses: actions/download-artifact@v4
        with:
          name: mac-cleanup-universal-apple-darwin
          path: universal

      - name: Extract version and sha256
        id: meta
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          SHA256=$(awk '{print $1}' universal/mac-cleanup-universal-apple-darwin.tar.gz.sha256)
          if [ -z "$SHA256" ]; then
            echo "::error::Failed to read sha256 from artifact"
            exit 1
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "Bumping to ${VERSION} with sha256 ${SHA256}"

      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          repository: ${{ env.TAP_OWNER }}/${{ env.TAP_REPO }}
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: tap

      - name: Update formula
        working-directory: tap
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          SHA256: ${{ steps.meta.outputs.sha256 }}
        run: |
          if [ ! -f "${FORMULA_PATH}" ]; then
            echo "::error::${FORMULA_PATH} not found in tap repo. Create it first (see README)."
            exit 1
          fi
          # Update the version string and sha256. Uses | as delimiter so slashes in the URL survive.
          sed -i "s|^  version \".*\"|  version \"${VERSION}\"|" "${FORMULA_PATH}"
          sed -i "s|^  sha256 \".*\"|  sha256 \"${SHA256}\"|" "${FORMULA_PATH}"
          echo "--- diff ---"
          git diff "${FORMULA_PATH}"

      - name: Commit and push
        working-directory: tap
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          if git diff --quiet "${FORMULA_PATH}"; then
            echo "Formula already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${FORMULA_PATH}"
          git commit -m "mac-cleanup ${VERSION}"
          git push
